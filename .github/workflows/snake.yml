name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Viraj-Kumar-Manocha
          outputs: |
            dist/github-contribution-grid-snake-dark.svg
      - uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch
      - run: |
          cp dist/*.svg output-branch/
          cd output-branch
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Update snake" || echo "No changes"
          git push
